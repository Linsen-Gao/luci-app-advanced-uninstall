name: Build IPK/APK Package

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build-ipk:
    name: Build IPK (OpenWrt 23.05/24.10)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libssl-dev python3 unzip wget rsync subversion \
          swig time xsltproc zlib1g-dev make
        
    - name: Download OpenWrt 23.05 SDK
      run: |
        wget -q https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz -O sdk.tar.xz || \
        wget -q https://downloads.openwrt.org/releases/23.05.4/targets/x86/64/openwrt-sdk-23.05.4-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz -O sdk.tar.xz || \
        wget -q https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz -O sdk.tar.xz
        
    - name: Extract SDK
      run: |
        tar -xf sdk.tar.xz
        SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -1)
        echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
        
    - name: Setup feeds
      run: |
        cd $SDK_DIR
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: Copy package
      run: |
        mkdir -p $SDK_DIR/package/luci-app-advanced-uninstall
        cp Makefile $SDK_DIR/package/luci-app-advanced-uninstall/
        cp -r src/controller $SDK_DIR/package/luci-app-advanced-uninstall/
        cp -r src/view $SDK_DIR/package/luci-app-advanced-uninstall/
        cp -r src/acl.d $SDK_DIR/package/luci-app-advanced-uninstall/
        
    - name: Build IPK
      run: |
        cd $SDK_DIR
        make defconfig
        make package/luci-app-advanced-uninstall/compile V=s
        
    - name: Find IPK
      id: find_ipk
      run: |
        IPK_FILE=$(find $SDK_DIR/bin -name "luci-app-advanced-uninstall*.ipk" 2>/dev/null | head -1)
        if [ -n "$IPK_FILE" ]; then
          cp "$IPK_FILE" ./luci-app-advanced-uninstall.ipk
          echo "ipk_found=true" >> $GITHUB_OUTPUT
        else
          echo "ipk_found=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Upload IPK
      if: steps.find_ipk.outputs.ipk_found == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ipk-package
        path: luci-app-advanced-uninstall.ipk

  build-apk:
    name: Build APK (OpenWrt 25.xx+)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libssl-dev python3 unzip wget rsync subversion \
          swig time xsltproc zlib1g-dev make
        
    - name: Download OpenWrt Snapshot SDK
      run: |
        # 尝试获取最新的 snapshot SDK
        wget -q https://downloads.openwrt.org/snapshots/targets/x86/64/openwrt-sdk-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.xz -O sdk.tar.xz || \
        wget -q https://downloads.openwrt.org/snapshots/targets/x86/64/ -O index.html && \
        SDK_URL=$(grep -oP 'href="openwrt-sdk-x86-64[^"]*\.tar\.xz"' index.html | head -1 | grep -oP '"[^"]+"' | tr -d '"') && \
        wget -q "https://downloads.openwrt.org/snapshots/targets/x86/64/$SDK_URL" -O sdk.tar.xz
        
    - name: Extract SDK
      run: |
        tar -xf sdk.tar.xz
        SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -1)
        echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
        
    - name: Setup feeds
      run: |
        cd $SDK_DIR
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: Copy package
      run: |
        mkdir -p $SDK_DIR/package/luci-app-advanced-uninstall
        cp Makefile $SDK_DIR/package/luci-app-advanced-uninstall/
        cp -r src/controller $SDK_DIR/package/luci-app-advanced-uninstall/
        cp -r src/view $SDK_DIR/package/luci-app-advanced-uninstall/
        cp -r src/acl.d $SDK_DIR/package/luci-app-advanced-uninstall/
        
    - name: Build APK
      run: |
        cd $SDK_DIR
        make defconfig
        # Snapshot SDK 可能使用 apk
        make package/luci-app-advanced-uninstall/compile V=s || \
        echo "Build may have failed, checking for output..."
        
    - name: Find APK
      id: find_apk
      run: |
        # 查找 .apk 文件
        APK_FILE=$(find $SDK_DIR/bin -name "luci-app-advanced-uninstall*.apk" 2>/dev/null | head -1)
        if [ -n "$APK_FILE" ]; then
          cp "$APK_FILE" ./luci-app-advanced-uninstall.apk
          echo "apk_found=true" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_FILE"
        else
          # 如果没有 .apk，可能是 .ipk (snapshot 也可能用 opkg)
          IPK_FILE=$(find $SDK_DIR/bin -name "luci-app-advanced-uninstall*.ipk" 2>/dev/null | head -1)
          if [ -n "$IPK_FILE" ]; then
            cp "$IPK_FILE" ./luci-app-advanced-uninstall-snapshot.ipk
            echo "apk_found=false" >> $GITHUB_OUTPUT
            echo "snapshot_ipk_found=true" >> $GITHUB_OUTPUT
            echo "Found Snapshot IPK: $IPK_FILE"
          else
            echo "apk_found=false" >> $GITHUB_OUTPUT
            echo "snapshot_ipk_found=false" >> $GITHUB_OUTPUT
            echo "No package found"
          fi
        fi
        
    - name: Upload APK
      if: steps.find_apk.outputs.apk_found == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: apk-package
        path: luci-app-advanced-uninstall.apk
        
    - name: Upload Snapshot IPK
      if: steps.find_apk.outputs.snapshot_ipk_found == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: snapshot-ipk-package
        path: luci-app-advanced-uninstall-snapshot.ipk

  create-installer:
    name: Create Installers
    needs: [build-ipk]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download IPK
      uses: actions/download-artifact@v4
      with:
        name: ipk-package
        path: ./artifacts
        
    - name: Create Makeself installer
      run: |
        sudo apt-get install -y makeself
        
        mkdir -p installer
        cp artifacts/*.ipk installer/ 2>/dev/null || true
        
        cat > installer/install.sh << 'SCRIPT'
        #!/usr/bin/env bash
        set -euo pipefail
        echo "========================================="
        echo " LuCI Advanced Uninstall Manager"
        echo " Installer v2.1.0"
        echo "========================================="
        echo ""
        
        # 检测包管理器
        if command -v apk >/dev/null 2>&1; then
          PKG_MGR="apk"
          PKG_EXT="apk"
          echo "Detected: apk (OpenWrt 25.xx+)"
        elif command -v opkg >/dev/null 2>&1; then
          PKG_MGR="opkg"
          PKG_EXT="ipk"
          echo "Detected: opkg (OpenWrt 23.05/24.10)"
        else
          echo "Error: No supported package manager found" >&2
          exit 1
        fi
        
        echo ""
        
        # 查找包文件
        BEST_PKG=$(ls -1t ./luci-app-advanced-uninstall*.ipk ./luci-app-advanced-uninstall*.apk 2>/dev/null | head -n1 || true)
        
        if [ -z "$BEST_PKG" ]; then
          echo "Error: No package file found" >&2
          exit 2
        fi
        
        echo "Installing: $BEST_PKG"
        
        if [ "$PKG_MGR" = "opkg" ]; then
          opkg remove luci-app-advanced-uninstall >/dev/null 2>&1 || true
          opkg update >/dev/null 2>&1 || true
          opkg install --force-reinstall --force-overwrite "$BEST_PKG" || \
          opkg install --force-reinstall --force-downgrade --force-depends --force-overwrite "$BEST_PKG"
        else
          apk del luci-app-advanced-uninstall >/dev/null 2>&1 || true
          apk update >/dev/null 2>&1 || true
          apk add --allow-untrusted "$BEST_PKG"
        fi
        
        echo ""
        echo "========================================="
        echo " Installation completed!"
        echo " Access: LuCI -> System -> 高级卸载"
        echo "========================================="
        SCRIPT
        chmod +x installer/install.sh
        echo "2.1.0" > installer/VERSION
        
        makeself --xz installer "luci-app-advanced-uninstall.run" \
          "LuCI Advanced Uninstall Manager v2.1.0" ./install.sh
          
    - name: Upload installer
      uses: actions/upload-artifact@v4
      with:
        name: installer
        path: luci-app-advanced-uninstall.run

  release:
    name: Create Release
    needs: [build-ipk, build-apk, create-installer]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: List artifacts
      run: |
        echo "=== IPK Package ==="
        ls -la ipk-package/ 2>/dev/null || echo "Not found"
        echo ""
        echo "=== APK Package ==="
        ls -la apk-package/ 2>/dev/null || echo "Not found"
        echo ""
        echo "=== Snapshot IPK ==="
        ls -la snapshot-ipk-package/ 2>/dev/null || echo "Not found"
        echo ""
        echo "=== Installer ==="
        ls -la installer/ 2>/dev/null || echo "Not found"
        
    - name: Prepare release files
      run: |
        mkdir -p release-files
        cp ipk-package/*.ipk release-files/ 2>/dev/null || true
        cp apk-package/*.apk release-files/ 2>/dev/null || true
        cp snapshot-ipk-package/*.ipk release-files/luci-app-advanced-uninstall-snapshot.ipk 2>/dev/null || true
        cp installer/*.run release-files/ 2>/dev/null || true
        ls -la release-files/
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: release-files/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
