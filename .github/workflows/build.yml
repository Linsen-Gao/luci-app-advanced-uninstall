name: Build IPK Package

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build Package
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
          gettext git java-propose-classpath libelf-dev libncurses5-dev \
          libncursesw5-dev libssl-dev python3 unzip wget rsync subversion \
          swig time xsltproc zlib1g-dev make
        
    - name: Download OpenWrt SDK
      run: |
        wget -q https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/openwrt-sdk-23.05.5-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz -O sdk.tar.xz || \
        wget -q https://downloads.openwrt.org/releases/23.05.4/targets/x86/64/openwrt-sdk-23.05.4-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz -O sdk.tar.xz || \
        wget -q https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz -O sdk.tar.xz
        
    - name: Extract SDK
      run: |
        tar -xf sdk.tar.xz
        SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -1)
        echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
        echo "Found SDK: $SDK_DIR"
        
    - name: Setup feeds
      run: |
        cd $SDK_DIR
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
    - name: Copy package to correct location
      run: |
        # 创建包目录
        mkdir -p $SDK_DIR/package/luci-app-advanced-uninstall
        
        # 复制 Makefile
        cp Makefile $SDK_DIR/package/luci-app-advanced-uninstall/
        
        # 复制源代码目录
        cp -r src/controller $SDK_DIR/package/luci-app-advanced-uninstall/
        cp -r src/view $SDK_DIR/package/luci-app-advanced-uninstall/
        cp -r src/acl.d $SDK_DIR/package/luci-app-advanced-uninstall/
        
        echo "Package files:"
        ls -la $SDK_DIR/package/luci-app-advanced-uninstall/
        
    - name: Build package
      run: |
        cd $SDK_DIR
        make defconfig
        make package/luci-app-advanced-uninstall/compile V=s
        
    - name: Find and copy IPK
      id: find_ipk
      run: |
        IPK_FILE=$(find $SDK_DIR/bin -name "luci-app-advanced-uninstall*.ipk" 2>/dev/null | head -1)
        if [ -n "$IPK_FILE" ]; then
          cp "$IPK_FILE" ./luci-app-advanced-uninstall.ipk
          echo "ipk_found=true" >> $GITHUB_OUTPUT
          echo "Found IPK: $IPK_FILE"
        else
          echo "ipk_found=false" >> $GITHUB_OUTPUT
          echo "No IPK found"
          echo "Searching for IPK files:"
          find $SDK_DIR/bin -name "*.ipk" 2>/dev/null | head -20
        fi
        
    - name: Create Makeself installer
      if: steps.find_ipk.outputs.ipk_found == 'true'
      run: |
        sudo apt-get install -y makeself
        
        mkdir -p installer
        cp luci-app-advanced-uninstall.ipk installer/
        
        cat > installer/install.sh << 'SCRIPT'
        #!/usr/bin/env bash
        set -euo pipefail
        echo "========================================="
        echo " LuCI Advanced Uninstall Manager"
        echo " Installer v2.0.2"
        echo "========================================="
        echo ""
        
        if command -v apk >/dev/null 2>&1; then
          PKG_MGR="apk"
          echo "Detected: apk (OpenWrt 25.xx+)"
        elif command -v opkg >/dev/null 2>&1; then
          PKG_MGR="opkg"
          echo "Detected: opkg (OpenWrt 23.05/24.10)"
        else
          echo "Error: No supported package manager found" >&2
          exit 1
        fi
        
        echo ""
        BEST_PKG=$(ls -1t ./luci-app-advanced-uninstall*.ipk 2>/dev/null | head -n1 || true)
        
        if [ -z "$BEST_PKG" ]; then
          echo "Error: No package file found" >&2
          exit 2
        fi
        
        echo "Installing: $BEST_PKG"
        
        if [ "$PKG_MGR" = "opkg" ]; then
          opkg remove luci-app-advanced-uninstall >/dev/null 2>&1 || true
          opkg update >/dev/null 2>&1 || true
          opkg install --force-reinstall --force-overwrite "$BEST_PKG" || \
          opkg install --force-reinstall --force-downgrade --force-depends --force-overwrite "$BEST_PKG"
        else
          apk del luci-app-advanced-uninstall >/dev/null 2>&1 || true
          apk update >/dev/null 2>&1 || true
          apk add --allow-untrusted "$BEST_PKG"
        fi
        
        echo ""
        echo "========================================="
        echo " Installation completed!"
        echo " Access: LuCI -> System -> 高级卸载"
        echo "========================================="
        SCRIPT
        chmod +x installer/install.sh
        echo "2.0.2" > installer/VERSION
        
        makeself --xz installer "luci-app-advanced-uninstall.run" \
          "LuCI Advanced Uninstall Manager v2.0.2" ./install.sh
          
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: packages
        path: |
          luci-app-advanced-uninstall.ipk
          luci-app-advanced-uninstall.run
        if-no-files-found: warn
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          luci-app-advanced-uninstall.ipk
          luci-app-advanced-uninstall.run
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
